<div class="container mt-3">
    <!-- Selector -->
    <div class="form-group mb-3">
      <label class="form-label fw-bold">Seleccionar alta:</label>
      <select class="form-select" [(ngModel)]="componenteSeleccionado">
        <option value="" disabled>-- Seleccione una opción --</option>
        <option value="plazasMasivas" selected>Creación de Plazas</option>
        <option value="empleadosMasivos" >Empleados Masivos</option>
      </select>
    </div>
    
    <!-- Contenedor de componentes -->
    <div class="">
      <div [ngSwitch]="componenteSeleccionado">
        <app-creacion-de-plazas *ngSwitchCase="'plazasMasivas'"></app-creacion-de-plazas>
        <app-empleados-masivos *ngSwitchCase="'empleadosMasivos'"></app-empleados-masivos>
        <div *ngSwitchDefault class="text-center text-muted p-5">
          <i class="fas fa-arrow-left me-2"></i>
          Seleccione una opción del menú
        </div>
      </div>
    </div>
</div>
