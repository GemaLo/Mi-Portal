<div class="subir-archivo-container" [class]="dragOverClass">
    <!-- Mostrar identificador de la instancia (opcional, para depuración) -->
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0">
            <!-- 📤 {{ tipoArchivo | titlecase }}  -->
            <small class="text-muted" *ngIf="idInstancia !== 'default'">
                ({{ idInstancia }})
            </small>
        </h6>
        <span class="badge bg-secondary">{{ estadisticas.totalArchivos }} archivo(s)</span>
    </div>
    
    <!-- Área de drop -->
    <div class="upload-area"
         (dragover)="onDragOver($event)"
         (dragleave)="onDragLeave($event)"
         (drop)="onDrop($event)">
        <i class="fas fa-cloud-upload-alt fa-3x text-muted mb-3"></i>
        <h5>Arrastra y suelta tu archivo</h5>
        <p class="text-muted">Extensiones permitidas: {{ aceptarExtensiones }}</p>
        <p class="text-muted small">Tamaño máximo: {{ tamanoMaximoMB }}MB</p>
        
        <input type="file" 
               #fileInput (change)="onFileSelected($event)" [accept]="aceptarExtensiones" 
               [multiple]="permitirMultiples" class="d-none">
        <button type="button" class="btn btn-primary" (click)="fileInput.click()">
            Seleccionar Archivo(s)
        </button>
    </div>
    
    <!-- Lista de archivos seleccionados -->
    <div *ngIf="archivosCargados.length > 0" class="mt-3">
        <div class="list-group">
            <div *ngFor="let archivo of archivosCargados; let i = index" 
                 class="list-group-item list-group-item-action">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <span class="me-2">📄</span>
                        <strong>{{ archivo.name }}</strong>
                        <br>
                        <small class="text-muted">
                            {{ (archivo.size / 1024).toFixed(2) }} KB
                        </small>
                    </div>
                    <button type="button" class="btn btn-sm btn-outline-danger" 
                            (click)="eliminarArchivo(i,idInstancia)">
                        ✖
                    </button>
                </div>
            </div>
        </div>
        
        <div class="mt-2">
            <button type="button" class="btn btn-sm btn-outline-secondary" 
                    (click)="limpiarArchivos()">
                🗑️ Limpiar todos
            </button>
        </div>
    </div>
</div>
